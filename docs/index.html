<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>University Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#09111f;--navy2:#0f1c30;--navy3:#162540;--navy4:#1e3050;
  --gold:#c8a94e;--gold2:#e8c97a;--gold-dim:rgba(200,169,78,.13);--gold-border:rgba(200,169,78,.22);
  --cream:#f0ebe0;--cream2:#c8c0b0;--muted:#5a6a88;--muted2:#3a4a62;
  --red:#c0392b;--green:#1e8449;--blue:#1a5276;
  --card:rgba(15,28,48,.85);--border:rgba(200,169,78,.18);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;overflow-x:hidden;}

/* ===LOGIN=== */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;background:var(--navy);}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 55% 45% at 15% 25%,rgba(200,169,78,.07) 0%,transparent 60%),radial-gradient(ellipse 40% 50% at 85% 75%,rgba(26,82,118,.06) 0%,transparent 60%);pointer-events:none;}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(200,169,78,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(200,169,78,.03) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;}
.login-box{position:relative;z-index:1;background:var(--navy2);border:1px solid var(--border);border-radius:3px;padding:52px 44px;width:410px;max-width:95vw;box-shadow:0 40px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(200,169,78,.08);animation:fadeUp .5s ease both;}
.login-box::after{content:'';position:absolute;top:0;left:40px;right:40px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.login-seal{text-align:center;margin-bottom:36px;}
.login-seal .mark{width:52px;height:52px;border:2px solid var(--gold-border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:20px;}
.login-seal .wordmark{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--cream);letter-spacing:.02em;}
.login-seal .tagline{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-top:3px;font-weight:500;}
.role-tabs{display:flex;border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:28px;}
.role-tab{flex:1;padding:9px 4px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.role-tab:last-child{border-right:none;}
.role-tab.active{background:var(--gold-dim);color:var(--gold);}
.fgrp{margin-bottom:18px;}
.flabel{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;font-weight:500;}
.finput,.fselect{width:100%;background:var(--navy3);border:1px solid var(--border);border-radius:2px;padding:11px 14px;color:var(--cream);font-family:'DM Mono',monospace;font-size:13px;outline:none;transition:border-color .2s;}
.finput:focus,.fselect:focus{border-color:var(--gold);}
.finput::placeholder{color:var(--muted2);}
.fselect option{background:var(--navy2);}
.btn-login{width:100%;padding:13px;background:var(--gold);color:var(--navy);border:none;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:background .2s;margin-top:6px;}
.btn-login:hover{background:var(--gold2);}
.demo-cred{text-align:center;margin-top:18px;font-size:11px;color:var(--muted);line-height:1.8;}
.demo-cred code{font-family:'DM Mono',monospace;color:var(--gold);background:var(--gold-dim);padding:1px 5px;border-radius:2px;font-size:11px;}
.login-err{color:#e74c3c;font-size:12px;margin-top:10px;text-align:center;display:none;}

/* ===APP=== */
#app{display:none;min-height:100vh;}
.topbar{height:58px;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;position:sticky;top:0;z-index:200;}
.tb-logo{font-family:'Playfair Display',serif;font-size:17px;color:var(--cream);font-weight:700;white-space:nowrap;flex-shrink:0;}
.tb-logo span{color:var(--gold);}
.tb-sep{width:1px;height:26px;background:var(--border);margin:0 4px;flex-shrink:0;}
.tb-nav{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;}
.tnav-btn{padding:6px 12px;background:transparent;border:none;border-radius:2px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s;}
.tnav-btn:hover{color:var(--cream);background:var(--navy3);}
.tnav-btn.active{color:var(--gold);background:var(--gold-dim);}
.tb-user{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0;}
.u-avatar{width:32px;height:32px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--gold);font-family:'DM Mono',monospace;}
.u-name{font-size:12px;font-weight:500;color:var(--cream);text-align:right;}
.u-role{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);}
.btn-logout{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
.btn-logout:hover{border-color:#e74c3c;color:#e74c3c;}

/* ===MAIN=== */
.main-layout{display:flex;min-height:calc(100vh - 58px);}
.sidebar{width:220px;flex-shrink:0;background:var(--navy2);border-right:1px solid var(--border);padding:20px 0;}
@media(max-width:768px){.sidebar{display:none;}}
.sidebar-section{margin-bottom:8px;}
.sidebar-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted2);padding:8px 20px 4px;font-weight:600;}
.snav-btn{display:block;width:100%;padding:9px 20px;background:transparent;border:none;text-align:left;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;cursor:pointer;transition:all .2s;border-left:2px solid transparent;}
.snav-btn:hover{color:var(--cream);background:var(--navy3);}
.snav-btn.active{color:var(--gold);background:var(--gold-dim);border-left-color:var(--gold);}
.content{flex:1;padding:28px 32px;overflow-x:auto;}
@media(max-width:600px){.content{padding:16px;}}

/* ===PAGES=== */
.page{display:none;animation:fadeUp .3s ease;}
.page.active{display:block;}
.ph{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.ph-left .ptitle{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--cream);line-height:1;}
.ph-left .psub{font-size:12px;color:var(--muted);margin-top:5px;letter-spacing:.04em;}
.ph-right{display:flex;gap:8px;flex-wrap:wrap;}

/* ===STATS=== */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:28px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:20px 18px;position:relative;overflow:hidden;transition:border-color .2s;}
.stat:hover{border-color:var(--gold);}
.stat::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold),transparent);opacity:.4;}
.stat-lbl{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:8px;}
.stat-val{font-family:'DM Mono',monospace;font-size:30px;font-weight:500;color:var(--gold);line-height:1;}
.stat-desc{font-size:10px;color:var(--muted);margin-top:4px;}

/* ===TABLE=== */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-bottom:22px;}
.tbl-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);gap:10px;flex-wrap:wrap;}
.tbl-ttl{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--cream);}
.tbl-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.srch{background:var(--navy3);border:1px solid var(--border);border-radius:2px;padding:6px 11px;color:var(--cream);font-family:'DM Mono',monospace;font-size:11px;outline:none;width:190px;transition:border-color .2s;}
.srch:focus{border-color:var(--gold);}
.srch::placeholder{color:var(--muted2);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:9px 16px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border);background:rgba(9,17,31,.4);white-space:nowrap;}
td{padding:10px 16px;border-bottom:1px solid rgba(200,169,78,.06);color:var(--cream2);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(200,169,78,.03);}
.tbl-empty{text-align:center;padding:40px;color:var(--muted);font-size:12px;}

/* ===BADGE=== */
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;font-family:'DM Mono',monospace;font-weight:500;letter-spacing:.05em;text-transform:uppercase;}
.bg-gold{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(200,169,78,.3);}
.bg-blue{background:rgba(26,82,118,.2);color:#5dade2;border:1px solid rgba(26,82,118,.4);}
.bg-green{background:rgba(30,132,73,.15);color:#2ecc71;border:1px solid rgba(30,132,73,.35);}
.bg-red{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.3);}
.bg-muted{background:rgba(90,106,136,.15);color:var(--muted);border:1px solid rgba(90,106,136,.3);}
.bg-purple{background:rgba(142,68,173,.15);color:#a569bd;border:1px solid rgba(142,68,173,.3);}

/* ===BUTTONS=== */
.btn{padding:6px 14px;border-radius:2px;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .2s;white-space:nowrap;border:1px solid;}
.btn-gold{background:var(--gold-dim);border-color:var(--border);color:var(--gold);}
.btn-gold:hover{background:rgba(200,169,78,.25);border-color:var(--gold);}
.btn-sm-danger{background:rgba(192,57,43,.1);border-color:rgba(192,57,43,.3);color:#e74c3c;}
.btn-sm-danger:hover{background:rgba(192,57,43,.2);border-color:#e74c3c;}
.btn-sm-success{background:rgba(30,132,73,.1);border-color:rgba(30,132,73,.3);color:#2ecc71;}
.btn-sm-success:hover{background:rgba(30,132,73,.2);border-color:#2ecc71;}
.btn-primary{background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:600;}
.btn-primary:hover{background:var(--gold2);}
.btn-outline{background:transparent;border-color:var(--border);color:var(--muted);}
.btn-outline:hover{border-color:var(--cream);color:var(--cream);}
.act-btns{display:flex;gap:5px;}

/* ===INFO CARD=== */
.icard{background:var(--card);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:20px;}
.icard-title{font-family:'Playfair Display',serif;font-size:15px;font-style:italic;color:var(--cream);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.irow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(200,169,78,.05);}
.irow:last-child{border-bottom:none;}
.ikey{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
.ival{font-family:'DM Mono',monospace;font-size:11px;color:var(--cream2);}

/* ===MODAL=== */
.modal-over{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
.modal-over.open{display:flex;}
.modal{background:var(--navy2);border:1px solid var(--border);border-radius:3px;padding:36px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;position:relative;animation:fadeUp .2s ease;box-shadow:0 40px 80px rgba(0,0,0,.55);}
.modal::after{content:'';position:absolute;top:0;left:40px;right:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;margin-bottom:20px;color:var(--cream);}
.modal-close{position:absolute;top:14px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;}
.modal-close:hover{color:var(--cream);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.modal-acts{display:flex;gap:10px;margin-top:24px;justify-content:flex-end;}

/* ===GRADES=== */
.ga{color:#2ecc71;font-weight:600;}
.gb{color:var(--gold);font-weight:600;}
.gc{color:#e67e22;font-weight:600;}
.gd{color:#e74c3c;font-weight:600;}
.gf{color:#c0392b;font-weight:600;}

/* ===PROGRESS=== */
.pbar{height:3px;background:var(--navy3);border-radius:2px;overflow:hidden;margin-top:5px;}
.pfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width .6s ease;}

/* ===NOTIF=== */
.notif{position:fixed;top:66px;right:20px;background:var(--navy2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:2px;padding:12px 18px;font-size:12px;color:var(--cream);z-index:600;transform:translateX(120%);transition:transform .3s ease;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.notif.show{transform:translateX(0);}
.notif.err{border-left-color:#e74c3c;}
.notif.ok{border-left-color:#2ecc71;}

/* ===SCHEDULE TABLE=== */
.sched-grid{display:grid;grid-template-columns:70px repeat(5,1fr);border:1px solid var(--border);border-radius:2px;overflow:hidden;background:var(--card);font-size:11px;}
.sgh{background:rgba(9,17,31,.4);padding:8px 4px;text-align:center;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);border-right:1px solid rgba(200,169,78,.06);}
.sgt{padding:12px 4px;text-align:center;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);border-bottom:1px solid rgba(200,169,78,.06);border-right:1px solid var(--border);}
.sgc{padding:3px;border-bottom:1px solid rgba(200,169,78,.06);border-right:1px solid rgba(200,169,78,.06);min-height:48px;}
.sge{background:var(--gold-dim);border:1px solid rgba(200,169,78,.3);border-radius:2px;padding:3px 5px;height:100%;font-size:9px;color:var(--gold2);line-height:1.4;}
.sge strong{display:block;font-size:10px;}

/* ===ANIM=== */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* === TWO COL === */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;}
@media(max-width:900px){.three-col{grid-template-columns:1fr 1fr;}}
@media(max-width:600px){.three-col{grid-template-columns:1fr;}}

textarea.finput{resize:vertical;min-height:80px;}
</style>
</head>
<body>
<div class="notif" id="notif"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="grid-bg"></div>
  <div class="login-box">
    <div class="login-seal">
      <div class="mark">🎓</div>
      <div class="wordmark">University Management System</div>
      <div class="tagline">Academic Information Portal</div>
    </div>
    <div class="role-tabs" id="role-tabs">
      <button class="role-tab active" onclick="setRole('Admin',this)">Admin</button>
      <button class="role-tab" onclick="setRole('Faculty',this)">Faculty</button>
      <button class="role-tab" onclick="setRole('Staff',this)">Staff</button>
      <button class="role-tab" onclick="setRole('Student',this)">Student</button>
    </div>
    <div class="fgrp">
      <label class="flabel">Username</label>
      <input class="finput" id="l-user" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="fgrp">
      <label class="flabel">Password</label>
      <input class="finput" id="l-pass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="login-err" id="login-err">Invalid username or password.</div>
    <div class="demo-cred" id="demo-hint">
      Demo — <code id="d-u">admin1001</code> / <code id="d-p">40h2lRb1a</code>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">UMS<span> Portal</span></div>
    <div class="tb-sep"></div>
    <div class="tb-nav" id="tb-nav"></div>
    <div class="tb-user">
      <div>
        <div class="u-name" id="u-name"></div>
        <div class="u-role" id="u-role"></div>
      </div>
      <div class="u-avatar" id="u-avatar"></div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>
  <div class="main-layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-students" class="page"></div>
      <div id="page-faculty" class="page"></div>
      <div id="page-staff-list" class="page"></div>
      <div id="page-courses" class="page"></div>
      <div id="page-enrollments" class="page"></div>
      <div id="page-grades" class="page"></div>
      <div id="page-appointments" class="page"></div>
      <div id="page-profile" class="page"></div>
      <div id="page-reports" class="page"></div>
      <div id="page-my-courses" class="page"></div>
      <div id="page-schedule" class="page"></div>
      <div id="page-transcript" class="page"></div>
      <div id="page-gpa" class="page"></div>
      <div id="page-financial" class="page"></div>
      <div id="page-register" class="page"></div>
      <div id="page-my-classes" class="page"></div>
      <div id="page-roster" class="page"></div>
      <div id="page-office-hours" class="page"></div>
      <div id="page-user-mgmt" class="page"></div>
      <div id="page-system-stats" class="page"></div>
      <div id="page-dept-data" class="page"></div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-over" id="modal-grade">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-grade')">✕</button>
    <div class="modal-title">Update Student Grade</div>
    <input type="hidden" id="mg-enr"/>
    <div class="fgrp"><label class="flabel">Context</label><div class="finput" id="mg-ctx" style="opacity:.6;cursor:default;font-size:12px;padding:10px 12px;"></div></div>
    <div class="form-row">
      <div class="fgrp"><label class="flabel">Letter Grade</label>
        <select class="fselect" id="mg-letter">
          <option>A</option><option>A-</option><option>B+</option><option>B</option>
          <option>B-</option><option>C+</option><option>C</option><option>C-</option>
          <option>D+</option><option>D</option><option>D-</option><option>F</option>
        </select>
      </div>
      <div class="fgrp"><label class="flabel">Numeric Score (0–100)</label>
        <input class="finput" id="mg-num" type="number" min="0" max="100"/>
      </div>
    </div>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeModal('modal-grade')">Cancel</button>
      <button class="btn btn-primary" onclick="submitGrade()">Save Grade</button>
    </div>
  </div>
</div>

<div class="modal-over" id="modal-apt">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-apt')">✕</button>
    <div class="modal-title">Book Advisor Appointment</div>
    <div class="fgrp"><label class="flabel">Advisor ID</label>
      <select class="fselect" id="apt-adv"></select>
    </div>
    <div class="form-row">
      <div class="fgrp"><label class="flabel">Date</label>
        <input class="finput" id="apt-date" type="date"/>
      </div>
      <div class="fgrp"><label class="flabel">Time</label>
        <input class="finput" id="apt-time" type="time"/>
      </div>
    </div>
    <div class="fgrp"><label class="flabel">Purpose</label>
      <select class="fselect" id="apt-purp">
        <option>Academic Planning</option><option>Grade Discussion</option>
        <option>Major Declaration</option><option>Career Guidance</option>
        <option>Study Abroad Consultation</option><option>Thesis Planning</option>
        <option>Transfer Credit Evaluation</option><option>Academic Probation Discussion</option>
        <option>Schedule Adjustment</option>
      </select>
    </div>
    <div class="modal-acts">
      <button class="btn btn-outline" onclick="closeModal('modal-apt')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAppt()">Book Appointment</button>
    </div>
  </div>
</div>

function djb2(str) {
  const MASK = (1n << 64n) - 1n;
  let h = 5381n;
  for (let i = 0; i < str.length; i++)
    h = (((h << 5n) + h) + BigInt(str.charCodeAt(i))) & MASK;
  return h.toString();
}

    document.getElementById('login-err').style.display = 'block';
    return;
  }
  CU = { ...found };
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

function doLogout() {
  CU = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('l-user').value = '';
  document.getElementById('l-pass').value = '';
  document.getElementById('login-err').style.display = 'none';
}

// ========== APP INIT ==========
function initApp() {
  const r = CU.role;
  document.getElementById('u-name').textContent = CU.fname + ' ' + CU.lname;
  document.getElementById('u-role').textContent = r.toUpperCase();
  document.getElementById('u-avatar').textContent = (CU.fname[0] + CU.lname[0]).toUpperCase();
  buildNav();
  navigate('dashboard');
}

function buildNav() {
  const r = CU.role;
  const cfg = NAV_CFG[r] || NAV_CFG.Admin;
  // Top nav
  const tb = document.getElementById('tb-nav');
  tb.innerHTML = '';
  // Sidebar
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  let lastGroup = '';
  const groups = {};
  cfg.forEach(n => {
    if (!groups[n.group]) groups[n.group] = [];
    groups[n.group].push(n);
  });
  Object.entries(groups).forEach(([grp, items]) => {
    const sec = document.createElement('div');
    sec.className = 'sidebar-section';
    sec.innerHTML = `<div class="sidebar-label">${grp}</div>`;
    items.forEach(n => {
      const b = document.createElement('button');
      b.className = 'snav-btn';
      b.textContent = n.label;
      b.dataset.page = n.page;
      b.onclick = () => navigate(n.page);
      sec.appendChild(b);
    });
    sb.appendChild(sec);
  });
  // Top nav (first unique pages)
  const seen = new Set();
  cfg.forEach(n => {
    if (!seen.has(n.page)) {
      seen.add(n.page);
      const b = document.createElement('button');
      b.className = 'tnav-btn';
      b.textContent = n.label;
      b.dataset.page = n.page;
      b.onclick = () => navigate(n.page);
      tb.appendChild(b);
    }
  });
}

function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.snav-btn, .tnav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('page-' + page);
  if (el) el.classList.add('active');
  document.querySelectorAll(`[data-page="${page}"]`).forEach(b => b.classList.add('active'));
  buildPage(page);
}

// ========== HELPERS ==========
function findUser(id) { return USERS.find(u => u.id === id); }
function findCourse(id) { return COURSES.find(c => c.id === id); }
function userEnrollments(stuId) { return ENROLLMENTS.filter(e => e.student === stuId); }
function userGrades(stuId) { return GRADES.filter(g => g.student === stuId); }
function facultyCourses(facId) { return COURSES.filter(c => c.instructor === facId); }
function courseEnrollments(crsId) { return ENROLLMENTS.filter(e => e.course === crsId); }
function studentGrade(stuId, crsId) { return GRADES.find(g => g.student === stuId && g.course === crsId); }

function gradeClass(letter) {
  if (!letter) return '';
  if (letter.startsWith('A')) return 'ga';
  if (letter.startsWith('B')) return 'gb';
  if (letter.startsWith('C')) return 'gc';
  if (letter.startsWith('D')) return 'gd';
  return 'gf';
}

function convertGPA(n) {
  if (n >= 93) return 4.0;
  if (n >= 90) return 3.7;
  if (n >= 87) return 3.3;
  if (n >= 83) return 3.0;
  if (n >= 80) return 2.7;
  if (n >= 77) return 2.3;
  if (n >= 73) return 2.0;
  if (n >= 70) return 1.7;
  if (n >= 67) return 1.3;
  if (n >= 63) return 1.0;
  if (n >= 60) return 0.7;
  return 0.0;
}

function calcGPA(stuId) {
  const gs = userGrades(stuId);
  if (!gs.length) return null;
  const pts = gs.map(g => convertGPA(g.numeric));
  return (pts.reduce((a, b) => a + b, 0) / pts.length).toFixed(2);
}

function academicStanding(gpa) {
  if (gpa === null) return { label: 'New Student', cls: 'bg-blue' };
  if (gpa >= 3.75) return { label: "Dean's List", cls: 'bg-gold' };
  if (gpa >= 3.5) return { label: 'Honor Roll', cls: 'bg-green' };
  if (gpa >= 2.0) return { label: 'Good Standing', cls: 'bg-muted' };
  return { label: 'Academic Probation', cls: 'bg-red' };
}

function deptLabel(d) {
  const m = {CS:'Computer Science',MATH:'Mathematics',PHYS:'Physics',CHEM:'Chemistry',
    BIO:'Biology',ENG:'English',HIST:'History',PSY:'Psychology',ECON:'Economics',
    BUS:'Business',ENGR:'Engineering',ART:'Art',MUS:'Music',POLI:'Political Science',SOC:'Sociology'};
  return m[d] || d;
}

function buildDashboard(el) {
  const r = CU.role;
  let html = `<div class="ph"><div class="ph-left"><div class="ptitle">Dashboard</div><div class="psub">Welcome back, ${CU.fname}. ${new Date().toLocaleDateString('en-US', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div></div>`;

    const faculty = USERS.filter(u => u.role === 'Faculty').length;
    const staff = USERS.filter(u => u.role === 'Staff').length;
    const avgGPA = (() => {
      const stuIds = USERS.filter(u => u.role === 'Student').map(u => u.id);
      const gpas = stuIds.map(id => calcGPA(id)).filter(g => g !== null).map(Number);
      return gpas.length ? (gpas.reduce((a, b) => a + b) / gpas.length).toFixed(2) : '—';
    })();
    html += `<div class="stats">
      ${stat('Total Students', students, 'Active registrations')}
      ${stat('Faculty', faculty, 'Instructors & professors')}
      ${stat('Staff', staff, 'Administrative & support')}
      ${stat('Courses', COURSES.length, 'This semester')}
      ${stat('Enrollments', ENROLLMENTS.length, 'Total records')}
      ${stat('Avg GPA', avgGPA, 'Student body')}
    </div>`;
    html += `<div class="two-col">
      <div class="icard">
        <div class="icard-title">Recent Enrollments</div>
        ${ENROLLMENTS.slice(-8).reverse().map(e => {
          const s = findUser(e.student), c = findCourse(e.course);
          return `<div class="irow">
            <span class="ikey">${s ? s.fname + ' ' + s.lname : e.student}</span>
            <span class="ival"><span class="badge bg-gold">${e.course}</span> ${e.semester}</span>
          </div>`;
        }).join('')}
      </div>
      <div class="icard">
        <div class="icard-title">Honor Roll Summary</div>
        ${[{min:3.75,label:"Dean's List",cls:'bg-gold'},{min:3.5,label:'Honor Roll',cls:'bg-green'},{min:2.0,label:'Good Standing',cls:'bg-muted'},{min:0,label:'Academic Probation',cls:'bg-red'}].map(tier => {
          const stuIds = USERS.filter(u => u.role === 'Student').map(u => u.id);
          const count = stuIds.filter(id => {
            const g = Number(calcGPA(id));
            return g !== null && g >= tier.min && (tier.min === 3.75 ? true : g < (tier.min === 3.5 ? 3.75 : tier.min === 2.0 ? 3.5 : 2.0));
          }).length;
          return `<div class="irow"><span class="ikey">${tier.label}</span><span><span class="badge ${tier.cls}">${count} students</span></span></div>`;
        }).join('')}
      </div>
    </div>`;

  } else if (r === 'Faculty') {
    const mc = facultyCourses(CU.id);
    const myStudentIds = new Set(mc.flatMap(c => courseEnrollments(c.id).map(e => e.student)));
    const pendingGrades = ENROLLMENTS.filter(e => mc.find(c => c.id === e.course) && !studentGrade(e.student, e.course)).length;
    html += `<div class="stats">
      ${stat('My Courses', mc.length, 'Assigned this term')}
      ${stat('My Students', myStudentIds.size, 'Enrolled in my courses')}
      ${stat('Pending Grades', pendingGrades, 'Awaiting entry')}
    </div>`;
    html += `<div class="icard"><div class="icard-title">My Assigned Courses</div>
      ${mc.map(c => `<div class="irow"><span class="ikey"><span class="badge bg-gold">${c.id}</span> ${c.name}</span><span class="ival">${c.schedule} · ${c.semester}</span></div>`).join('') || '<div class="irow"><span class="ikey">No courses assigned</span></div>'}
    </div>`;

  } else if (r === 'Staff') {
    html += `<div class="stats">
      ${stat('Total Users', USERS.length, 'All accounts')}
      ${stat('Courses', COURSES.length, 'In catalogue')}
      ${stat('Enrollments', ENROLLMENTS.length, 'Active records')}
      ${stat('Appointments', APPOINTMENTS.length, 'All scheduled')}
    </div>`;
    html += `<div class="icard"><div class="icard-title">Quick Actions</div>
      <div class="irow"><span class="ikey">View student records</span><button class="btn btn-gold" onclick="navigate('students')">Go →</button></div>
      <div class="irow"><span class="ikey">Manage course schedule</span><button class="btn btn-gold" onclick="navigate('courses')">Go →</button></div>
      <div class="irow"><span class="ikey">Enrollment management</span><button class="btn btn-gold" onclick="navigate('enrollments')">Go →</button></div>
      <div class="irow"><span class="ikey">Generate reports</span><button class="btn btn-gold" onclick="navigate('reports')">Go →</button></div>
    </div>`;

  } else { // Student
    const myE = userEnrollments(CU.id);
    const myG = userGrades(CU.id);
    const gpa = calcGPA(CU.id);
    const standing = academicStanding(Number(gpa));
    html += `<div class="stats">
      ${stat('Enrolled Courses', myE.length, 'Total registrations')}
      ${stat('Grades Recorded', myG.length, 'Current records')}
      ${stat('GPA', gpa ?? '—', 'Cumulative / 4.0')}
    </div>`;
    html += `<div class="two-col">
      <div class="icard">
        <div class="icard-title">Academic Standing</div>
        <div class="irow"><span class="ikey">Status</span><span><span class="badge ${standing.cls}">${standing.label}</span></span></div>
        <div class="irow"><span class="ikey">GPA</span><span class="ival">${gpa ?? '—'} / 4.0</span></div>
        <div class="irow"><span class="ikey">Courses Completed</span><span class="ival">${myG.length}</span></div>
      </div>

        }).join('') || '<div class="irow"><span class="ikey">No enrollments</span></div>'}
      </div>
    </div>`;
  }
  el.innerHTML = html;
}

function stat(label, val, desc) {
  return `<div class="stat"><div class="stat-lbl">${label}</div><div class="stat-val">${val}</div><div class="stat-desc">${desc}</div></div>`;
}

function buildReports(el) {
  const students = USERS.filter(u => u.role === 'Student');
  const stuIds = students.map(u => u.id);
  const gpas = stuIds.map(id => Number(calcGPA(id))).filter(g => !isNaN(g) && g > 0);
  const avgGPA = (gpas.reduce((a, b) => a + b, 0) / gpas.length).toFixed(2);

  // Grade dist
  const dist = {A:0,'A-':0,'B+':0,B:0,'B-':0,'C+':0,C:0,'C-':0,'D+':0,D:0,'D-':0,F:0};
  GRADES.forEach(g => { if (dist[g.letter] !== undefined) dist[g.letter]++; });
  const totalG = GRADES.length || 1;

  // Dept dist
  const deptCounts = {};
  COURSES.forEach(c => { deptCounts[c.dept] = (deptCounts[c.dept] || 0) + 1; });

  el.innerHTML = `
    <div class="ph"><div class="ph-left"><div class="ptitle">Reports & Analytics</div><div class="psub">System-wide academic performance data</div></div></div>
    <div class="stats">
      ${stat('Students', students.length, 'Registered')}
      ${stat('Faculty', USERS.filter(u=>u.role==='Faculty').length, 'Active')}
      ${stat('Courses', COURSES.length, 'Offered')}
      ${stat('Enrollments', ENROLLMENTS.length, 'Total')}
      ${stat('Avg GPA', avgGPA, 'All students')}
      ${stat('Honor Students', gpas.filter(g=>g>=3.5).length, 'GPA ≥ 3.5')}
    </div>
    <div class="two-col">
      <div class="icard">
        <div class="icard-title">Grade Distribution</div>
        ${Object.entries(dist).map(([g, cnt]) => {
          const pct = Math.round(cnt / totalG * 100);
          return `<div style="margin-bottom:12px">
            <div class="irow" style="border:none;padding:0 0 3px">
              <span class="${gradeClass(g.replace('+','').replace('-',''))} " style="font-size:12px;font-weight:600;">${g}</span>
              <span style="font-family:'DM Mono',monospace;font-size:11px;color:var(--cream2)">${cnt} (${pct}%)</span>
            </div>
            <div class="pbar"><div class="pfill" style="width:${pct}%"></div></div>
          </div>`;
        }).join('')}
      </div>
      <div>
        <div class="icard">
          <div class="icard-title">Courses by Department</div>
          ${Object.entries(deptCounts).sort((a,b)=>b[1]-a[1]).map(([d,n])=>`
            <div style="margin-bottom:10px">
              <div class="irow" style="border:none;padding:0 0 3px">
                <span class="ikey">${deptLabel(d)}</span>
                <span class="ival">${n} courses</span>
              </div>
              <div class="pbar"><div class="pfill" style="width:${Math.round(n/COURSES.length*100)}%"></div></div>

      </div>
    </div>
    <div class="icard">
      <div class="icard-title">Top Students by GPA</div>
      <table><thead><tr><th>Rank</th><th>Student</th><th>ID</th><th>GPA</th><th>Standing</th><th>Courses</th></tr></thead>
      <tbody>
        ${stuIds.map(id => ({id, gpa: Number(calcGPA(id)), enr: userEnrollments(id).length}))
          .filter(x => x.gpa > 0).sort((a,b) => b.gpa - a.gpa).slice(0, 15).map((x, i) => {
            const u = findUser(x.id);

function buildSchedule(el) {
  const myE = userEnrollments(CU.id);
  const myCourses = myE.map(e => findCourse(e.course)).filter(Boolean);
  const days = ['Mon','Tue','Wed','Thu','Fri'];
  const hours = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00'];

  el.innerHTML = `
    <div class="ph"><div class="ph-left"><div class="ptitle">Class Schedule</div><div class="psub">Weekly timetable</div></div></div>
    <div class="sched-grid">
      <div class="sgh">Time</div>
      ${days.map(d => `<div class="sgh">${d}</div>`).join('')}
      ${hours.map(h => {
        let row = `<div class="sgt">${h}</div>`;
        days.forEach(day => {
          const match = myCourses.find(c => {
            const sch = c.schedule;
            const hasDay = (day==='Mon' && (sch.includes('MWF')||sch.includes('MW')||sch.includes('Mon')))
                        || (day==='Tue' && (sch.includes('TTh')||sch.includes('Tue')))
                        || (day==='Wed' && (sch.includes('MWF')||sch.includes('MW')||sch.includes('Wed')))
                        || (day==='Thu' && (sch.includes('TTh')||sch.includes('Thu')))
                        || (day==='Fri' && sch.includes('MWF'));
            const hasTime = sch.includes(h);
            return hasDay && hasTime;
          });
          if (match) {
            row += `<div class="sgc"><div class="sge"><strong>${match.id}</strong>${match.name.split(' ').slice(0,3).join(' ')}</div></div>`;
          } else {
            row += `<div class="sgc"></div>`;
          }
        });
        return row;
      }).join('')}
    </div>
    <div class="icard" style="margin-top:20px">
      <div class="icard-title">Course Legend</div>
      ${myCourses.map(c => `<div class="irow"><span class="ikey"><span class="badge bg-gold">${c.id}</span></span><span class="ival">${c.name} · ${c.schedule}</span></div>`).join('')}

}

function registerCourse(courseId) {
  const c = findCourse(courseId);
  if (!c || c.enrolled >= c.capacity) { showNotif('Course is full', 'err'); return; }
  if (ENROLLMENTS.find(e => e.student === CU.id && e.course === courseId)) {
    showNotif('Already enrolled in this course', 'err'); return;
  }
  const today = new Date().toISOString().slice(0, 10);
  ENROLLMENTS.push({ id: 'ENR' + String(++_enrCounter).padStart(4,'0'), student: CU.id, course: courseId, semester: 'Fall 2025', date: today });
  c.enrolled++;
  showNotif(`Enrolled in ${courseId}!`, 'ok');
  buildRegister(document.getElementById('page-register'));
}

    ${mc.map(c => {

      return `<div class="tbl-wrap" style="margin-bottom:22px">

          <span class="tbl-ttl">${c.id} — ${c.name}</span>
          <div class="tbl-tools">
            <span class="badge bg-blue">${c.schedule}</span>

            <span class="badge bg-gold">${c.semester}</span>

// ========== ROSTER ==========
function buildRoster(el) {
  const mc = facultyCourses(CU.id);
  const facOrAdmin = CU.role === 'Faculty' || CU.role === 'Admin';
  if (!mc.length && CU.role === 'Faculty') {
    el.innerHTML = `<div class="ph"><div class="ph-left"><div class="ptitle">Class Roster</div></div></div><div class="icard"><div class="tbl-empty">No courses assigned</div></div>`;
    return;
  }
  const coursePool = CU.role === 'Admin' ? COURSES : mc;
  el.innerHTML = `
    <div class="ph"><div class="ph-left"><div class="ptitle">Class Roster</div></div></div>
    <div class="fgrp" style="max-width:320px;margin-bottom:20px">
      <label class="flabel">Select Course</label>
      <select class="fselect" id="roster-sel" onchange="renderRosterTable()">
        ${coursePool.map(c => `<option value="${c.id}">${c.id} — ${c.name}</option>`).join('')}
      </select>
    </div>
    <div id="roster-tbl"></div>`;
  renderRosterTable();
}

function renderRosterTable() {
  const sel = document.getElementById('roster-sel');
  if (!sel) return;
  const courseId = sel.value;
  const enrolled = courseEnrollments(courseId);
  document.getElementById('roster-tbl').innerHTML = `
    <div class="tbl-wrap">
      <div class="tbl-bar"><span class="tbl-ttl">Roster for ${courseId}</span><span class="badge bg-muted" style="margin-left:8px">${enrolled.length} students</span></div>
      <table><thead><tr><th>Student ID</th><th>Name</th><th>Email</th><th>Enrolled</th><th>Grade</th></tr></thead>
      <tbody>
        ${enrolled.map(e => {
          const s = findUser(e.student);
          const g = studentGrade(e.student, courseId);
          return `<tr>
            <td><span class="badge bg-muted">${e.student}</span></td>
            <td>${s ? s.fname + ' ' + s.lname : e.student}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px">${s ? s.email : '—'}</td>
            <td style="font-family:'DM Mono',monospace;font-size:11px">${e.date}</td>
            <td>${g ? `<strong class="${gradeClass(g.letter)}">${g.letter} (${g.numeric.toFixed(1)})</strong>` : '<span style="color:var(--muted)">No grade</span>'}</td>
          </tr>`;
        }).join('') || `<tr><td colspan="5" class="tbl-empty">No students enrolled</td></tr>`}
      </tbody></table>
    </div>`;
}

// ========== MODALS ==========
let _gradeCtx = {};

function openGradeModal(stuId, crsId, letter, numeric) {
  _gradeCtx = { stuId: stuId || '', crsId: crsId || '' };
  if (stuId && crsId) {
    const s = findUser(stuId), c = findCourse(crsId);
    document.getElementById('mg-ctx').textContent = `${s ? s.fname + ' ' + s.lname : stuId} — ${crsId}`;
    document.getElementById('mg-letter').value = letter || 'B';
    document.getElementById('mg-num').value = numeric || 80;
  } else {
    document.getElementById('mg-ctx').textContent = 'Select from grades table or use fields below';
    document.getElementById('mg-letter').value = 'B';
    document.getElementById('mg-num').value = '';
  }
  openModal('modal-grade');
}

function submitGrade() {
  const { stuId, crsId } = _gradeCtx;
  if (!stuId || !crsId) { showNotif('No student/course selected', 'err'); return; }
  const letter = document.getElementById('mg-letter').value;
  const num = parseFloat(document.getElementById('mg-num').value);
  if (isNaN(num) || num < 0 || num > 100) { showNotif('Enter a score between 0 and 100', 'err'); return; }
  const existing = GRADES.findIndex(g => g.student === stuId && g.course === crsId);
  const entry = { id: 'GRD' + String(++_gradeCounter).padStart(4,'0'), student: stuId, course: crsId, letter, numeric: num, semester: 'Fall 2024' };
  if (existing >= 0) GRADES[existing] = { ...GRADES[existing], letter, numeric: num };
  else GRADES.push(entry);
  closeModal('modal-grade');
  showNotif('Grade saved', 'ok');
  buildGrades(document.getElementById('page-grades'));
  if (document.getElementById('page-my-classes').classList.contains('active'))
    buildMyClasses(document.getElementById('page-my-classes'));
}

function openAptModal() {
  const faculty = USERS.filter(u => u.role === 'Faculty');
  document.getElementById('apt-adv').innerHTML = faculty.map(f => `<option value="${f.id}">${f.fname} ${f.lname} (${f.id})</option>`).join('');
  openModal('modal-apt');
}

function submitAppt() {
  const advisor = document.getElementById('apt-adv').value;
  const date = document.getElementById('apt-date').value;
  const time = document.getElementById('apt-time').value;
  const purpose = document.getElementById('apt-purp').value;
  if (!date || !time) { showNotif('Please select date and time', 'err'); return; }
  APPOINTMENTS.push({ id: 'APT' + String(++_aptCounter).padStart(3,'0'), student: CU.id, advisor, date, time, purpose, status: 'Scheduled' });
  closeModal('modal-apt');
  showNotif('Appointment booked!', 'ok');
  buildAppointments(document.getElementById('page-appointments'));
}

function openEnrollModal() {
  const students = USERS.filter(u => u.role === 'Student');
  document.getElementById('enr-stu').innerHTML = students.map(s => `<option value="${s.id}">${s.fname} ${s.lname} (${s.id})</option>`).join('');
  document.getElementById('enr-crs').innerHTML = COURSES.map(c => `<option value="${c.id}">${c.id} — ${c.name}</option>`).join('');
  openModal('modal-enroll');
}

function submitEnrollment() {
  const stuId = document.getElementById('enr-stu').value;
  const crsId = document.getElementById('enr-crs').value;
  const sem = document.getElementById('enr-sem').value;
  if (ENROLLMENTS.find(e => e.student === stuId && e.course === crsId)) {
    showNotif('Student already enrolled in this course', 'err'); return;
  }
  const today = new Date().toISOString().slice(0,10);
  ENROLLMENTS.push({ id: 'ENR' + String(++_enrCounter).padStart(4,'0'), student: stuId, course: crsId, semester: sem, date: today });
  const c = findCourse(crsId);
  if (c) c.enrolled++;
  closeModal('modal-enroll');
  showNotif('Student enrolled!', 'ok');
  buildEnrollments(document.getElementById('page-enrollments'));
}

function openAddCourse() {
  const faculty = USERS.filter(u => u.role === 'Faculty');
  document.getElementById('nc-ins').innerHTML = faculty.map(f => `<option value="${f.id}">${f.fname} ${f.lname}</option>`).join('');
  openModal('modal-course-add');
}

function submitNewCourse() {
  const id = document.getElementById('nc-id').value.trim().toUpperCase();
  const nm = document.getElementById('nc-nm').value.trim();
  const cr = parseInt(document.getElementById('nc-cr').value);
  const dept = document.getElementById('nc-dept').value;
  const cap = parseInt(document.getElementById('nc-cap').value);
  const sch = document.getElementById('nc-sch').value.trim();
  const sem = document.getElementById('nc-sem').value;
  const ins = document.getElementById('nc-ins').value;
  if (!id || !nm) { showNotif('Course ID and name required', 'err'); return; }
  if (COURSES.find(c => c.id === id)) { showNotif('Course ID already exists', 'err'); return; }
  COURSES.push({ id, name: nm, credits: cr || 3, dept, schedule: sch, instructor: ins, capacity: cap || 30, enrolled: 0, semester: sem });
  closeModal('modal-course-add');
  showNotif(`Course ${id} added`, 'ok');
  buildCourseList(document.getElementById('page-courses'));
}

function openUpdateInfo() {
  document.getElementById('ui-email').value = CU.email;
  document.getElementById('ui-phone').value = CU.phone;
  openModal('modal-update-info');
}

function submitUpdateInfo() {
  const email = document.getElementById('ui-email').value.trim();
  const phone = document.getElementById('ui-phone').value.trim();
  if (!email) { showNotif('Email is required', 'err'); return; }
  CU.email = email;
  CU.phone = phone;
  const u = USERS.find(x => x.id === CU.id);
  if (u) { u.email = email; u.phone = phone; }
  closeModal('modal-update-info');
  showNotif('Personal information updated', 'ok');
  if (document.getElementById('page-profile').classList.contains('active'))
    buildProfile(document.getElementById('page-profile'));
}

// ========== UTILS ==========
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-over').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));

function filterTbl(id, q) {
  const rows = document.querySelectorAll(`#${id} tbody tr`);
  const lq = q.toLowerCase();
  rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(lq) ? '' : 'none');
}

let _notifT;
function showNotif(msg, type='') {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.className = 'notif show' + (type ? ' ' + type : '');
  clearTimeout(_notifT);
  _notifT = setTimeout(() => n.classList.remove('show'), 3000);
}
