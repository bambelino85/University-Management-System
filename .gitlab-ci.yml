image: bambelino85/ums-sbom-builder:latest

variables:
  APP_VERSION: "1.0.0"

stages:
  - build
  - sbom_generate
  - sbom_sign
  - sbom_scan
  - report

build:cpp:
  stage: build
  script:
    - echo "[Build] Compiling..."
    - make clean && make
    - echo "3" | ./university_app
    - echo "[Build] Smoke test passed"
  artifacts:
    paths:
      - university_app
    expire_in: 1 hour

sbom:generate:
  stage: sbom_generate
  needs: [build:cpp]
  script:
    - mkdir -p sbom reports
    - python3 scripts/csv_to_sbom.py --input sbom-components.csv --output sbom/custom-components.json --version $APP_VERSION
    - syft dir:. --output cyclonedx-json@1.4=sbom/syft-cots.json
    - trivy filesystem --format cyclonedx --output sbom/trivy-os.json .
    - cyclonedx merge --input-files sbom/syft-cots.json sbom/trivy-os.json sbom/custom-components.json --output-file sbom/holistic-sbom.json --output-format json
    - python3 scripts/patch_sbom_version.py sbom/holistic-sbom.json
    - cyclonedx validate --input-file sbom/holistic-sbom.json --input-format json --input-version v1_4
    - echo "[SBOM] Generation and validation complete"
  artifacts:
    paths:
      - sbom/
    expire_in: 1 week

sbom:sign:
  stage: sbom_sign
  needs: [sbom:generate]
  script:
    - cyclonedx convert --input-file sbom/holistic-sbom.json --input-format json --output-file sbom/holistic-sbom.xml --output-format xml
    - cp sbom/holistic-sbom.xml sbom/holistic-sbom-signed.xml
    - cyclonedx sign bom sbom/holistic-sbom-signed.xml --key-file $SBOM_SIGNING_KEY
    - cyclonedx verify all sbom/holistic-sbom-signed.xml --key-file keys/public/sbom-rsa-public.pem
    - echo "[Sign] SBOM signed and verified"
  artifacts:
    paths:
      - sbom/
    expire_in: 1 month

sbom:scan:
  stage: sbom_scan
  needs: [sbom:sign]
  script:
    - mkdir -p reports
    - grype sbom:sbom/holistic-sbom.json --output json --file reports/vuln-report.json
    - python3 scripts/vuln_summary.py --input reports/vuln-report.json --output reports/vuln-analysis-report.html
    - python3 scripts/vuln_print_summary.py
  artifacts:
    paths:
      - reports/
    expire_in: 1 month
  allow_failure: true

report:publish:
  stage: report
  needs: [sbom:scan]
  script:
    - echo "[Report] Pipeline complete"
    - ls -lh sbom/ reports/
  artifacts:
    name: "sbom-attestation-v${APP_VERSION}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - university_app
      - sbom/holistic-sbom-signed.xml
      - sbom/holistic-sbom.json
      - reports/vuln-analysis-report.html
      - reports/vuln-report.json
    expire_in: 3 months
    when: always
